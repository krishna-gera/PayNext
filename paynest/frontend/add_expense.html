<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Expense</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="centered-page">
  <form id="expense-form" class="card form-card">
    <h2>Add Shared Expense</h2>
    <input name="group_id" placeholder="Group ID" required />
    <input name="title" placeholder="Title" required />
    <input name="amount" type="number" step="0.01" placeholder="Amount" required />
    <input name="paid_by" placeholder="Payer User ID" required />
    <input name="date" type="date" required />
    <select name="split_type">
      <option value="equal">Equal</option>
      <option value="percentage">Percentage</option>
      <option value="exact">Exact</option>
      <option value="share">Share-based</option>
    </select>
    <textarea name="description" placeholder="Description"></textarea>
    <input name="participants" placeholder='Participants JSON e.g. [{"user_id":"1","value":50}]' required />
    <button class="btn primary" type="submit">Save Expense</button>
    <a href="dashboard.html">Go to Dashboard</a>
  </form>
  <script src="js/expenses.js"></script>
</body>
</html>
